# Next.js on Netlify — @netlify/plugin-nextjs v5 expects:
# - publish = the Next build output folder (`.next`), NOT the repo root.
# - next.config `output: "standalone"` so `.next/standalone` exists (see next.config.ts).
#
# If the Netlify UI sets "Publish directory" to `.` or blank wrongly, this file overrides it.
# You can still clear Publish directory in the dashboard to avoid future confusion.

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
